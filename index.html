<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PinTrend Analytics | wwclab. Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Manrope:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --brand-blue: #0A1F44; --bg: #FFFFFF; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Manrope', sans-serif; background: var(--bg); color: var(--brand-blue); 
            height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; 
        }
        .hero { text-align: center; max-width: 600px; padding: 2rem; animation: fadeIn 1s ease-out; }
        
        /* 圓形 Logo 容器 */
        .logo-container { 
            width: 120px; height: 120px; margin: 0 auto 2.5rem; 
            border-radius: 50%; overflow: hidden; 
            border: 2px solid var(--brand-blue); 
            box-shadow: 0 10px 30px rgba(10, 31, 68, 0.12);
            background: #fff; transition: 0.3s;
        }
        .logo-container:hover { transform: scale(1.1); }
        .logo-container img { width: 100%; height: 100%; object-fit: cover; }

        h1 { font-family: 'Instrument Serif', serif; font-size: 3.5rem; line-height: 1.1; margin-bottom: 1.5rem; color: #111; }
        h1 em { font-style: italic; color: var(--brand-blue); }
        p { font-size: 1.1rem; color: #666; margin-bottom: 2.5rem; font-weight: 300; }

        .btn-portal {
            display: inline-flex; align-items: center; gap: 12px;
            background: var(--brand-blue); color: white; text-decoration: none;
            padding: 18px 45px; border-radius: 100px; font-weight: 600; font-size: 1.1rem;
            box-shadow: 0 10px 25px rgba(10, 31, 68, 0.2); transition: 0.3s; border: none; cursor: pointer;
        }
        .btn-portal:hover { background: #061530; transform: translateY(-3px); }

        .footer-links { position: absolute; bottom: 40px; font-size: 0.8rem; color: #AAA; }
        .footer-links a { color: #AAA; text-decoration: none; margin: 0 10px; }
        .footer-links a:hover { color: var(--brand-blue); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="hero">
        <div class="logo-container">
            <img src="logo.png" alt="wwclab. logo">
        </div>
        <h1>Unlock Your <em>Pinterest</em> Potential</h1>
        <p>Professional creator insights and performance tracking powered by wwclab.</p>
        
        <button class="btn-portal" onclick="window.location.href='dashboard.html'">
            Analyze with PinTrend
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="5" y1="12" x2="19" y2="12"></line>
                <polyline points="12 5 19 12 12 19"></polyline>
            </svg>
        </button>
    </div>

    <div class="footer-links">
        <a href="privacy.html">Privacy Policy</a> • 
        <span>© 2026 wwclab. Analytics</span>
    </div>
</body>
</html>
