<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PinTrend Analytics | Winnie Chiang</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Manrope:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #F8FAFC;
            --bg-card: #FFFFFF;
            --text: #1E3A5F;
            --text-muted: #64748B;
            --text-subtle: #94A3B8;
            --accent: #0EA5E9;
            --accent-secondary: #06B6D4;
            --accent-dim: rgba(14, 165, 233, 0.1);
            --accent-gradient: linear-gradient(135deg, #0EA5E9, #06B6D4);
            --border: #E2E8F0;
            --border-light: #F1F5F9;
            --shadow: rgba(14, 165, 233, 0.08);
            --shadow-lg: rgba(14, 165, 233, 0.15);
            --pin-red: #BD081C;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Manrope', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        /* Background Blobs */
        .bg-gradient { position: fixed; inset: 0; pointer-events: none; z-index: -1; overflow: hidden; }
        .blob { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.5; animation: blobFloat 20s ease-in-out infinite; }
        .blob-1 { width: 500px; height: 500px; background: linear-gradient(135deg, rgba(189, 8, 28, 0.2), rgba(14, 165, 233, 0.15)); top: -150px; right: -100px; }
        .blob-2 { width: 400px; height: 400px; background: linear-gradient(135deg, rgba(14, 165, 233, 0.2), rgba(6, 182, 212, 0.15)); bottom: -100px; left: -100px; animation-delay: -7s; }
        @keyframes blobFloat { 0%, 100% { transform: translate(0, 0) scale(1); } 33% { transform: translate(30px, -30px) scale(1.05); } 66% { transform: translate(-20px, 20px) scale(0.95); } }

        /* Hero Section */
        .hero {
            text-align: center;
            max-width: 650px;
            padding: 2rem;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Logo */
        .logo-container {
            width: 100px;
            height: 100px;
            margin: 0 auto 2rem;
            border-radius: 50%;
            overflow: hidden;
            border: 2px solid var(--pin-red);
            box-shadow: 0 10px 30px rgba(189, 8, 28, 0.15);
            background: #fff;
            transition: 0.3s ease;
        }
        .logo-container:hover { transform: scale(1.08); }
        .logo-container img { width: 100%; height: 100%; object-fit: cover; }

        /* Section Label */
        .section-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem;
            color: var(--pin-red);
            margin-bottom: 1rem;
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
        .section-label::before {
            content: '';
            width: 20px;
            height: 1px;
            background: var(--pin-red);
        }
        .section-label::after {
            content: '';
            width: 20px;
            height: 1px;
            background: var(--pin-red);
        }

        /* Title */
        h1 {
            font-family: 'Instrument Serif', serif;
            font-size: clamp(2.5rem, 6vw, 3.5rem);
            line-height: 1.15;
            margin-bottom: 1.5rem;
            color: var(--text);
            font-weight: 400;
        }
        h1 em {
            font-style: italic;
            color: var(--pin-red);
        }

        /* Description */
        .description {
            font-size: 1.1rem;
            color: var(--text-muted);
            margin-bottom: 2.5rem;
            font-weight: 400;
            line-height: 1.8;
        }

        /* Button */
        .btn-primary {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: var(--pin-red);
            color: white;
            text-decoration: none;
            padding: 1rem 2.5rem;
            border-radius: 12px;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 600;
            font-size: 0.85rem;
            box-shadow: 0 8px 25px rgba(189, 8, 28, 0.25);
            transition: 0.3s ease;
            border: none;
            cursor: pointer;
        }
        .btn-primary:hover {
            background: #a00719;
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(189, 8, 28, 0.3);
        }
        .btn-primary svg {
            transition: transform 0.3s ease;
        }
        .btn-primary:hover svg {
            transform: translateX(4px);
        }

        /* Footer */
        .footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 1.5rem 2rem;
            text-align: center;
            background: rgba(248, 250, 252, 0.8);
            backdrop-filter: blur(10px);
            border-top: 1px solid var(--border-light);
        }
        .footer-links {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1.5rem;
            flex-wrap: wrap;
        }
        .footer-links a {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            color: var(--text-muted);
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: 0.3s;
        }
        .footer-links a:hover { color: var(--pin-red); }
        .footer-links span {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            color: var(--text-subtle);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .hero { padding: 1.5rem; }
            h1 { font-size: 2rem; }
            .description { font-size: 1rem; }
            .btn-primary { padding: 0.9rem 2rem; font-size: 0.8rem; }
            .footer { position: relative; margin-top: 3rem; }
        }
    </style>
</head>
<body>
    <div class="bg-gradient">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="hero">
        <div class="logo-container">
            <img src="logo.png" alt="PinTrend Analytics">
        </div>
        
        <div class="section-label">Analytics Dashboard</div>
        
        <h1>Unlock Your <em>Pinterest</em> Potential</h1>
        
        <p class="description">
            Professional creator insights and performance tracking. 
            Visualize impressions, clicks, and engagement metrics in real-time.
        </p>
        
        <button class="btn-primary" onclick="window.location.href='dashboard.html'">
            Launch Dashboard
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="5" y1="12" x2="19" y2="12"></line>
                <polyline points="12 5 19 12 12 19"></polyline>
            </svg>
        </button>
    </div>

    <footer class="footer">
        <div class="footer-links">
            <a href="https://weiweichiang0813-art.github.io/portfolio/" target="_blank">Portfolio</a>
            <a href="privacy.html">Privacy Policy</a>
            <a href="https://github.com/weiweichiang0813-art/pinterest-analytics" target="_blank">GitHub</a>
            <span>© 2026 WINNIE CHIANG</span>
        </div>
    </footer>
</body>
</html>
