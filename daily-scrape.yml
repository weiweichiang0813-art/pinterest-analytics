# GitHub Actions Workflow
# 每天早上 9:00 EST 自動執行 Pinterest Analytics 爬蟲

name: Pinterest Analytics Daily Scraper

on:
  # 定時執行：每天早上 9:00 EST (14:00 UTC)
  schedule:
    - cron: '0 14 * * *'
  
  # 手動觸發
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
      # 1. Checkout 程式碼
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 設定 Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. 安裝依賴
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright gspread google-auth
          playwright install chromium
          playwright install-deps

      # 4. 設定 Pinterest Session
      - name: Setup Pinterest Session
        run: |
          echo '${{ secrets.PINTEREST_SESSION }}' > scraper/pinterest_session.json

      # 5. 設定 Google 憑證
      - name: Setup Google Credentials
        run: |
          echo '${{ secrets.GOOGLE_CREDENTIALS }}' > scraper/credentials.json

      # 6. 執行全自動爬蟲
      - name: Run Pinterest Auto Scraper
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          CI: true
        run: |
          cd scraper
          python auto_scraper.py

      # 7. 上傳結果（可選）
      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scrape-results-${{ github.run_number }}
          path: scraper/scrape_result.json
          retention-days: 30
