<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terradomi Pinterest Analytics | Professional Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Manrope:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --pinterest-red: #E60023;
            --bg: #FAFBFC;
            --bg-elevated: #FFFFFF;
            --text: #111111;
            --text-muted: #767676;
            --border: #E2E8F0;
            --accent-dim: rgba(230, 0, 35, 0.05);
            --shadow: rgba(0, 0, 0, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Manrope', sans-serif; background: var(--bg); color: var(--text); }

        /* Header matching Login Page */
        header {
            background: var(--bg-elevated);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            position: sticky; top: 0; z-index: 100;
        }
        .header-content {
            max-width: 1400px; margin: 0 auto;
            display: flex; justify-content: space-between; align-items: center;
        }
        .logo-section { display: flex; align-items: center; gap: 1rem; text-decoration: none; }
        .logo-icon {
            width: 32px; height: 32px; background: var(--pinterest-red);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
        }
        .logo-icon svg { width: 18px; height: 18px; fill: white; }
        .logo-text { font-family: 'Instrument Serif', serif; font-size: 1.25rem; color: var(--text); }

        .dashboard { max-width: 1400px; margin: 0 auto; padding: 2.5rem 2rem; }
        
        /* Stats Grid */
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.5rem; margin-bottom: 2rem; }
        .stat-card {
            background: var(--bg-elevated); border-radius: 20px; padding: 1.5rem;
            border: 1px solid var(--border); transition: all 0.3s ease;
        }
        .stat-card:hover { transform: translateY(-3px); box-shadow: 0 10px 30px var(--shadow); border-color: var(--pinterest-red); }
        .stat-label { font-size: 0.85rem; color: var(--text-muted); font-weight: 600; margin-bottom: 0.5rem; display: block; }
        .stat-value { font-family: 'Instrument Serif', serif; font-size: 2.5rem; color: var(--pinterest-red); line-height: 1; }

        /* Charts Section */
        .charts-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 1.5rem; margin-bottom: 2rem; }
        .card { background: var(--bg-elevated); border-radius: 24px; padding: 1.5rem; border: 1px solid var(--border); }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
        .card-title { font-family: 'Instrument Serif', serif; font-size: 1.5rem; }
        
        /* Period Switcher */
        .tabs { display: flex; gap: 0.5rem; background: #F0F0F0; padding: 0.25rem; border-radius: 10px; }
        .tab { 
            padding: 0.4rem 1rem; border: none; background: transparent; 
            font-size: 0.75rem; font-family: 'JetBrains Mono', monospace; 
            cursor: pointer; border-radius: 8px; transition: 0.2s;
        }
        .tab.active { background: white; color: var(--pinterest-red); font-weight: bold; }

        /* Tables */
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th { text-align: left; padding: 1rem; font-size: 0.7rem; text-transform: uppercase; color: var(--text-muted); border-bottom: 1px solid var(--border); }
        td { padding: 1rem; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
        .pin-title { font-weight: 600; color: #333; }

        /* Keyword Search Box */
        .search-box { position: relative; margin-top: 1rem; }
        .search-input {
            width: 100%; padding: 0.8rem 1rem 0.8rem 2.5rem;
            border-radius: 100px; border: 1px solid var(--border);
            background: #F0F2F5; font-size: 0.9rem;
        }
        .search-icon { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-muted); }

        .keyword-results { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.75rem; margin-top: 1.5rem; }
        .kw-tag { 
            background: var(--bg-elevated); border: 1px solid var(--border); 
            padding: 0.75rem; border-radius: 12px; font-size: 0.85rem; 
            display: flex; justify-content: space-between;
        }
        .kw-vol { color: var(--pinterest-red); font-weight: 700; font-family: 'JetBrains Mono'; }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <a href="#" class="logo-section">
                <div class="logo-icon">
                    <svg viewBox="0 0 24 24"><path d="M12 0C5.373 0 0 5.373 0 12c0 5.084 3.163 9.426 7.627 11.174-.105-.949-.2-2.405.042-3.441.218-.937 1.407-5.965 1.407-5.965s-.359-.719-.359-1.782c0-1.668.967-2.914 2.171-2.914 1.023 0 1.518.769 1.518 1.69 0 1.029-.655 2.568-.994 3.995-.283 1.194.599 2.169 1.777 2.169 2.133 0 3.772-2.249 3.772-5.495 0-2.873-2.064-4.882-5.012-4.882-3.414 0-5.418 2.561-5.418 5.207 0 1.031.397 2.138.893 2.738.098.119.112.224.083.345l-.333 1.36c-.053.22-.174.267-.402.161-1.499-.698-2.436-2.889-2.436-4.649 0-3.785 2.75-7.262 7.929-7.262 4.163 0 7.398 2.967 7.398 6.931 0 4.136-2.607 7.464-6.227 7.464-1.216 0-2.359-.632-2.75-1.378l-.748 2.853c-.271 1.043-1.002 2.35-1.492 3.146C9.57 23.812 10.763 24 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0z"/></svg>
                </div>
                <span class="logo-text">Terradomi Pinterest Analytics</span>
            </a>
            <div style="font-family: 'JetBrains Mono'; font-size: 0.75rem; color: var(--text-muted);" id="lastSync">SYNCING...</div>
        </div>
    </header>

    <main class="dashboard">
        <div class="stats-grid">
            <div class="stat-card"><span class="stat-label">IMPRESSIONS</span><div class="stat-value" id="imp">0</div></div>
            <div class="stat-card"><span class="stat-label">PIN CLICKS</span><div class="stat-value" id="clk">0</div></div>
            <div class="stat-card"><span class="stat-label">SAVES</span><div class="stat-value" id="sav">0</div></div>
            <div class="stat-card"><span class="stat-label">ENGAGEMENT</span><div class="stat-value" id="eng">0%</div></div>
        </div>

        <div class="charts-grid">
            <div class="card">
                <div class="card-header">
                    <h3 class="card-title">Performance Trend</h3>
                    <div class="tabs">
                        <button class="tab active" onclick="changePeriod('daily')">DAILY</button>
                        <button class="tab" onclick="changePeriod('weekly')">WEEKLY</button>
                        <button class="tab" onclick="changePeriod('monthly')">MONTHLY</button>
                    </div>
                </div>
                <div style="height: 300px;"><canvas id="mainChart"></canvas></div>
            </div>
            <div class="card">
                <h3 class="card-title">Keyword Research</h3>
                <div class="search-box">
                    <span class="search-icon">🔍</span>
                    <input type="text" class="search-input" id="kwInput" placeholder="Analyze home decor, candles..." onkeyup="searchKeywords()">
                </div>
                <div class="keyword-results" id="kwResults"></div>
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
            <div class="card">
                <h3 class="card-title">Top Performing Pins</h3>
                <table id="topPinsTable">
                    <thead><tr><th>Pin Title</th><th>Impressions</th><th>Engagement</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
            <div class="card">
                <h3 class="card-title">Recent Activity Log</h3>
                <table id="recentLogTable">
                    <thead><tr><th>Date</th><th>Pin Title</th><th>Impressions</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        const SHEET_ID = '1A3RLxLbjffrOy7CSqQKJ3nLP-JkuTLp8z6a2GhXAlmg';
        const DATA_SHEET = 'Pinterest%20Analytics%20Data';
        const KW_SHEET = 'Keywords';
        
        let rawRows = [];
        let trendChart;

        async function init() {
            const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${DATA_SHEET}`;
            try {
                const response = await fetch(url);
                const text = await response.text();
                const data = JSON.parse(text.substr(47).slice(0, -2));
                rawRows = data.table.rows;
                
                updateStats();
                changePeriod('daily');
                renderTables();
                searchKeywords(); // Load initial trends
                
                document.getElementById('lastSync').innerText = `LAST SYNC: ${rawRows[rawRows.length-1].c[0].v}`;
            } catch (e) { console.error(e); }
        }

        function updateStats() {
            let tImp = 0, tSav = 0, tClk = 0;
            rawRows.forEach(r => {
                tImp += (r.c[1]?.v || 0);
                tSav += (r.c[2]?.v || 0);
                tClk += (r.c[3]?.v || 0);
            });
            document.getElementById('imp').innerText = formatNum(tImp);
            document.getElementById('clk').innerText = formatNum(tClk);
            document.getElementById('sav').innerText = formatNum(tSav);
            document.getElementById('eng').innerText = ((tClk + tSav) / tImp * 100).toFixed(1) + '%';
        }

        function changePeriod(mode) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event?.target?.classList?.add('active');

            let aggregated = {};
            rawRows.forEach(r => {
                let d = r.c[0].v; // 格式 YYYY-MM-DD
                let key = d;
                if(mode === 'monthly') key = d.substring(0, 7);
                if(mode === 'weekly') {
                    let date = new Date(d);
                    key = d.substring(0, 4) + "-W" + Math.ceil(date.getDate() / 7);
                }
                if(!aggregated[key]) aggregated[key] = 0;
                aggregated[key] += (r.c[1]?.v || 0);
            });

            const labels = Object.keys(aggregated).sort();
            const values = labels.map(l => aggregated[l]);

            if(trendChart) trendChart.destroy();
            trendChart = new Chart(document.getElementById('mainChart').getContext('2d'), {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Impressions',
                        data: values,
                        borderColor: '#E60023',
                        backgroundColor: 'rgba(230, 0, 35, 0.05)',
                        fill: true, tension: 0.3, borderWidth: 3, pointRadius: 5
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });
        }

        function renderTables() {
            // Top Pins (Sorted by Impressions)
            const sorted = [...rawRows].sort((a,b) => (b.c[1]?.v || 0) - (a.c[1]?.v || 0)).slice(0, 5);
            document.querySelector('#topPinsTable tbody').innerHTML = sorted.map(r => `
                <tr>
                    <td class="pin-title">${r.c[6]?.v || 'Untitled'}</td>
                    <td>${formatNum(r.c[1]?.v || 0)}</td>
                    <td style="color:green; font-weight:bold;">${r.c[5]?.v || 0}%</td>
                </tr>
            `).join('');

            // Recent Log
            const recent = [...rawRows].slice(-5).reverse();
            document.querySelector('#recentLogTable tbody').innerHTML = recent.map(r => `
                <tr>
                    <td>${r.c[0].v}</td>
                    <td>${r.c[6]?.v || 'Untitled'}</td>
                    <td>${formatNum(r.c[1]?.v || 0)}</td>
                </tr>
            `).join('');
        }

        async function searchKeywords() {
            const input = document.getElementById('kwInput').value.toLowerCase();
            const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${KW_SHEET}`;
            try {
                const response = await fetch(url);
                const text = await response.text();
                const data = JSON.parse(text.substr(47).slice(0, -2));
                const kwRows = data.table.rows;
                
                const filtered = kwRows.filter(r => r.c[1].v.toLowerCase().includes(input)).slice(0, 6);
                document.getElementById('kwResults').innerHTML = filtered.map(r => `
                    <div class="kw-tag">
                        <span>${r.c[1].v}</span>
                        <span class="kw-vol">${r.c[2].v}</span>
                    </div>
                `).join('');
            } catch(e) {}
        }

        function formatNum(n) { return n >= 1000 ? (n/1000).toFixed(1) + 'K' : n; }
        
        init();
    </script>
</body>
</html>
