<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PinTrend Analytics Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* 新增：頁尾置中與樣式優化 */
        .dashboard-footer {
            text-align: center;
            padding: 4rem 2rem 2rem;
            border-top: 1px solid #EEE;
            margin-top: 3rem;
            width: 100%;
        }
        .footer-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 1rem;
        }
        .footer-links a { color: #767676; text-decoration: none; font-weight: 500; }
        .footer-links a:hover { color: #E60023; }

        /* 標題居中與開放性命名 */
        .header-content { justify-content: center; position: relative; }
        .back-link { position: absolute; left: 2rem; }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <span class="logo-text">PinTrend Analytics</span>
        </div>
    </header>

    <main class="dashboard">
        <div class="card">
            <div class="card-header">
                <h3 class="card-title">Performance Overview</h3>
                <div style="display: flex; gap: 10px;">
                    <select id="metricSelector" onchange="updateTrendChart()" class="tab">
                        <option value="imp">Impressions</option>
                        <option value="clk">Clicks</option>
                        <option value="sav">Saves</option>
                    </select>
                    <div class="tabs">
                        <button class="tab active" onclick="setPeriod('daily')">DAILY</button>
                        <button class="tab" onclick="setPeriod('weekly')">WEEKLY</button>
                    </div>
                </div>
            </div>
            <canvas id="mainChart"></canvas>
        </div>

        <div class="card">
            <h3 class="card-title">Top Performing Pins</h3>
            <table id="topPinsTable">
                </table>
        </div>
    </main>

    <footer class="dashboard-footer">
        <div class="footer-links">
            <a href="index.html">Home</a>
            <a href="privacy.html">Privacy Policy</a>
            <a href="https://github.com/...">GitHub</a>
        </div>
        <p>Built by <strong>Wei Wei Chiang</strong> • PinTrend Open Analytics Platform</p>
    </footer>

    <script>
        let currentPeriod = 'daily';
        let currentMetric = 'imp';

        function renderTables(rows) {
            // 關鍵修改：過濾 Untitled 與 Pinterest 標題
            const filteredRows = rows.filter(r => {
                const title = r.c[6]?.v || "";
                return title !== "Untitled Pin" && title !== "Pinterest" && title !== "";
            });

            // 依據 Impression 排序
            const topPins = [...filteredRows].sort((a,b) => b.c[1].v - a.c[1].v).slice(0, 5);
            
            document.querySelector('#topPinsTable').innerHTML = topPins.map(r => `
                <tr>
                    <td>${r.c[6].v}</td>
                    <td>${formatNum(r.c[1].v)}</td>
                    <td style="color:green">${r.c[5].v}%</td>
                </tr>
            `).join('');
        }

        // 趨勢圖現在會根據「抓取日期」來排列
        function updateTrendChart() {
            currentMetric = document.getElementById('metricSelector').value;
            // 這裡會抓取試算表中的 A 欄（date）作為 X 軸
            // 只要你每天跑爬蟲，這條線就會隨著日期生長出來
            // ... (其餘 Chart.js 邏輯保持之前給你的加總版本)
        }
    </script>
</body>
</html>
