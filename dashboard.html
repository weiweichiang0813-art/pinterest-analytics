<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PinTrend Analytics | Creator Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Manrope:wght@300;400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --brand-blue: #0A1F44; 
            --bg: #FAFBFC;
            --bg-elevated: #FFFFFF;
            --text: #111111;
            --border: #E2E8F0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Manrope', sans-serif; background: var(--bg); color: var(--text); }

        /* Header - 置中對齊 */
        header {
            background: var(--bg-elevated);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            position: sticky; top: 0; z-index: 100;
        }
        .header-content {
            max-width: 1400px; margin: 0 auto;
            display: flex; justify-content: center; align-items: center;
            position: relative;
        }
        
        /* Logo 圓形裁切 */
        .logo-section { display: flex; align-items: center; gap: 0.75rem; text-decoration: none; }
        .logo-icon {
            width: 35px; height: 35px;
            border-radius: 50%;
            overflow: hidden;
            display: flex; align-items: center; justify-content: center;
            border: 1.5px solid var(--brand-blue);
        }
        .logo-icon img { width: 100%; height: 100%; object-fit: cover; }
        .logo-text { font-family: 'Instrument Serif', serif; font-size: 1.25rem; color: var(--text); }

        /* Dashboard 佈局 */
        .dashboard { max-width: 1400px; margin: 0 auto; padding: 2.5rem 2rem; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.5rem; margin-bottom: 2rem; }
        .stat-card {
            background: var(--bg-elevated); border-radius: 20px; padding: 1.5rem;
            border: 1px solid var(--border);
        }
        .stat-value { font-family: 'Instrument Serif', serif; font-size: 2.5rem; color: var(--brand-blue); }

        .charts-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 1.5rem; margin-bottom: 2rem; }
        .card { background: var(--bg-elevated); border-radius: 24px; padding: 1.5rem; border: 1px solid var(--border); }
        
        /* 表格樣式 */
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 1rem; font-size: 0.7rem; color: #767676; border-bottom: 1px solid var(--border); }
        td { padding: 1rem; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
        .pin-title-cell { font-weight: 600; color: var(--brand-blue); }

        /* Footer - 強制置中 */
        .dashboard-footer {
            text-align: center;
            padding: 4rem 2rem;
            border-top: 1px solid var(--border);
            margin-top: 4rem;
            width: 100%;
        }
        .footer-links {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-bottom: 1.2rem;
        }
        .footer-links a { color: #767676; text-decoration: none; font-weight: 500; }
        .footer-links a:hover { color: var(--brand-blue); }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <a href="index.html" class="logo-section">
                <div class="logo-icon"><img src="logo.png" alt="logo"></div>
                <span class="logo-text">PinTrend Analytics</span>
            </a>
        </div>
    </header>

    <main class="dashboard">
        <div class="stats-grid">
            <div class="stat-card"><span>IMPRESSIONS</span><div class="stat-value" id="imp">0</div></div>
            <div class="stat-card"><span>CLICKS</span><div class="stat-value" id="clk">0</div></div>
            <div class="stat-card"><span>SAVES</span><div class="stat-value" id="sav">0</div></div>
            <div class="stat-card"><span>ENGAGEMENT</span><div class="stat-value" id="eng">0%</div></div>
        </div>

        <div class="charts-grid">
            <div class="card">
                <div style="height: 300px;"><canvas id="mainChart"></canvas></div>
            </div>
            <div class="card">
                <h3>Keyword Research</h3>
                <div id="kwResults"></div>
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
            <div class="card">
                <h3>Top Performing Pins</h3>
                <table id="topPinsTable"><tbody></tbody></table>
            </div>
            <div class="card">
                <h3>Recent Activity</h3>
                <table id="recentLogTable"><tbody></tbody></table>
            </div>
        </div>
    </main>

    <footer class="dashboard-footer">
        <div class="footer-links">
            <a href="index.html">Home</a>
            <a href="privacy.html">Privacy Policy</a>
            <a href="https://github.com/...">GitHub</a>
        </div>
        <p>Built by <strong>Wei Wei Chiang</strong> • Powered by wwclab.</p>
    </footer>

    <script>
        // ... (這裡放 init(), renderStats(), renderTables() 等函數)
        // 記得在 renderTables 裡加入這段過濾邏輯：
        function renderTables(rows) {
            const filtered = rows.filter(r => {
                const t = r.c[6]?.v || "";
                return t !== "Untitled Pin" && t !== "Pinterest" && t !== "";
            });
            // ... 後續渲染 HTML
        }
    </script>
</body>
</html>
